clock:
  family: V
  variant: a
  primary: true
  proxy_type: output_norm
  norm_type: l2
  normalize_by_dim: false
  sample_reduce: mean
  cycle_reduce: mean
  trim_fraction: 0.1
  proxy_power: 1.0
  smoothing_window: 1
  epsilon: 1.0e-8
  calibration_nfe: 32
  calibration_samples: 8
  calibration_cycles: 4
  target_nfes: [6, 8, 12, 16, 20]
