name: lcs_confirmation_pndm
backend: pndm
base_config:
  dataset: cifar10
  metrics: [fid]
  num_gpus: 4
  prepare_schedules_first: true
  save_samples: false
  num_samples: 20000
  batch_size: 1024
model_assets:
  - pndm_model_ddim_cifar10
solvers:
  - euler
  - heun2
  - dpm_solver_lu
schedules:
  - base
  - LCS-1
solver_schedules:
  euler: [base, LCS-1]
  heun2: [base, LCS-1]
  dpm_solver_lu: [base]
eval_nfes: [5, 7, 11, 15]
