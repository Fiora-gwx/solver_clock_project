name: schedule_vs_clock_small
backend: pndm
base_config:
  metrics: [fid]
  num_gpus: 4
  prepare_schedules_first: true
datasets:
  - cifar10
  - lsun_bedroom
  - lsun_church
solvers:
  - euler
  - heun2
  - deis
  - dpm_solver_lu
  - dpm_solver_default
  - stork4_1st
  - stork4_2nd
schedules:
  - base
  - V_a
  - LCS-1
  - LCS-2
solver_schedules:
  euler: [base, V_a, LCS-1, LCS-2]
  heun2: [base, V_a, LCS-1, LCS-2]
  deis: [base, V_a, LCS-1, LCS-2]
  dpm_solver_lu: [base, V_a, LCS-1, LCS-2]
  dpm_solver_default: [base]
  stork4_1st: [base, V_a, LCS-1, LCS-2]
  stork4_2nd: [base, V_a, LCS-1, LCS-2]
eval_nfes: [5, 7, 9, 11, 15, 19, 23, 31]
