name: cifar10_mainline
backend: pndm
base_config:
  dataset: cifar10
  metrics: [fid]
  num_gpus: 4
  prepare_schedules_first: true
  save_samples: false
  preview_samples: 8
model_assets:
  - pndm_model_ddim_cifar10
  - pndm_model_pf_cifar10
  - pndm_model_pf_deep_cifar10
solvers:
  - euler
  - deis
  - heun2
  - stork4_1st
  - stork4_2nd
schedules:
  - base
  - SADB
solver_schedules:
  euler: [base, SADB]
  heun2: [base, SADB]
  deis: [base]
  stork4_1st: [base, SADB]
  stork4_2nd: [base, SADB]
eval_nfes: [5, 7, 9, 11, 15, 23, 31]
