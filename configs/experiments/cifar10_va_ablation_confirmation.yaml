name: cifar10_va_ablation_confirmation
backend: pndm
base_config:
  dataset: cifar10
  metrics: [fid]
  num_gpus: 4
  prepare_schedules_first: true
  save_samples: false
  num_samples: 50000
  batch_size: 1024
model_assets:
  - pndm_model_ddim_cifar10
solvers:
  - euler
  - stork4_2nd
schedules:
  - V_a
eval_nfes: [6, 8, 12, 16, 20]
clock_variants:
  - label: baseline
    path: configs/clocks/V_a_ablation_baseline.yaml
  - label: robust_heavy
    path: configs/clocks/V_a_combo_robust.yaml
  - label: sharp_heavy
    path: configs/clocks/V_a_combo_sharp.yaml
  - label: flat_heavy
    path: configs/clocks/V_a_combo_flat.yaml
  - label: awinners
    path: configs/clocks/V_a_combo_awinners.yaml
