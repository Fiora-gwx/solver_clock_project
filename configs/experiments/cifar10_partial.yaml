name: cifar10_partial
backend: pndm
base_config:
  dataset: cifar10
  metrics: [fid]
  num_gpus: 4
  prepare_schedules_first: true
  save_samples: false
  preview_samples: 8
  num_samples: 20000
  batch_size: 1024
  clock_config: configs/clocks/SADB_partial_offline_fine.yaml
model_assets:
  - pndm_model_ddim_cifar10
solvers:
  - euler
  - heun2
  - deis
  - stork4_1st
  - stork4_2nd
schedules:
  - base
  - SADB
solver_schedules:
  euler: [base, SADB]
  heun2: [base, SADB]
  deis: [base]
  stork4_1st: [base, SADB]
  stork4_2nd: [base, SADB]
eval_nfes: [5, 7, 11, 15, 31, 63]
