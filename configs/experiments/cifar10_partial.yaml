name: cifar10_partial
backend: pndm
base_config:
  dataset: cifar10
  metrics: [fid]
  num_gpus: 4
  prepare_schedules_first: true
  save_samples: false
  preview_samples: 8
  num_samples: 20000
  batch_size: 1024
  clock_config: configs/clocks/LCS_1_partial_offline_fine.yaml
  schedule_clock_configs:
    LCS-1: configs/clocks/LCS_1_partial_offline_fine.yaml
model_assets:
  - pndm_model_ddim_cifar10
solvers:
  - euler
  - heun2
  - deis
  - dpm_solver_lu
  - dpm_solver_default
  - stork4_1st
  - stork4_2nd
schedules:
  - base
  - LCS-1
solver_schedules:
  euler: [base, LCS-1]
  heun2: [base, LCS-1]
  deis: [base, LCS-1]
  dpm_solver_lu: [base]
  dpm_solver_default: [base]
  stork4_1st: [base, LCS-1]
  stork4_2nd: [base, LCS-1]
eval_nfes: [5, 7, 11, 15]
